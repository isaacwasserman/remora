name: Release

on:
  push:
    branches: [main]

jobs:
  canary:
    runs-on: ubuntu-latest
    concurrency:
      group: canary-release
      cancel-in-progress: true
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Check for pending changesets
        id: check
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "changeset_count=$count" >> "$GITHUB_OUTPUT"

      - name: Version canary snapshot
        if: steps.check.outputs.changeset_count != '0'
        run: bunx changeset version --snapshot canary

      - name: Build
        if: steps.check.outputs.changeset_count != '0'
        run: bun run build

      - name: Publish canary to npm
        if: steps.check.outputs.changeset_count != '0'
        run: npm publish --tag canary --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    runs-on: ubuntu-latest
    concurrency:
      group: stable-release
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bun run build && npm publish --provenance --access public
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
