name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun run build

      # When changesets exist: publish canary + open/update Version Packages PR
      # When no changesets (Version Packages PR just merged): publish stable release
      - name: Check for pending changesets
        id: check
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "changeset_count=$count" >> "$GITHUB_OUTPUT"

      - name: Publish canary
        if: steps.check.outputs.changeset_count != '0'
        run: |
          bunx changeset version --snapshot canary
          npm publish --tag canary --provenance --access public --no-git-checks

      - name: Restore package.json
        if: steps.check.outputs.changeset_count != '0'
        run: git checkout -- .

      - name: Create Release PR or Publish stable
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: npm publish --provenance --access public
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
