name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    concurrency:
      group: canary-release
      cancel-in-progress: true
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Check for pending changesets
        id: check
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' -exec grep -l '": ' {} \; | wc -l)
          echo "changeset_count=$count" >> "$GITHUB_OUTPUT"

      - name: Version canary snapshot
        if: steps.check.outputs.changeset_count != '0'
        id: version
        run: |
          npx changeset version --snapshot canary
          version=$(node -p "require('./packages/core/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if echo "$version" | grep -q "canary"; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Snapshot version was not applied (version=$version). Skipping publish. Ensure changesets include a package bump."
          fi

      - name: Publish canary to npm
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          cd packages/core && npm publish --tag canary --provenance --access public --no-git-checks && cd ../..
          cd packages/ui && npm publish --tag canary --provenance --access public --no-git-checks

  release:
    runs-on: ubuntu-latest
    concurrency:
      group: stable-release
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Check if release action should run
        id: check
        run: |
          # Count changesets that contain a package bump (line matching `": `).
          pending=$(find .changeset -name '*.md' ! -name 'README.md' -exec grep -l '": ' {} \; | wc -l)

          # Determine whether any workspace package version is not yet on npm.
          # This covers the case where a "Version Packages" PR has just merged:
          # no changesets remain, but package.json versions need to be published.
          needs_publish=false
          for pkg in packages/core packages/ui; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if ! npm view "$name@$version" version > /dev/null 2>&1; then
              echo "$name@$version is not yet on npm"
              needs_publish=true
            fi
          done

          if [ "$pending" -gt 0 ] || [ "$needs_publish" = "true" ]; then
            echo "run_action=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_action=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No pending changesets and all package versions are already published. Skipping changesets action."
          fi

      - name: Remove empty changesets
        if: steps.check.outputs.run_action == 'true'
        run: |
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            if ! grep -q '": ' "$f" 2>/dev/null; then
              echo "Removing empty changeset: $f"
              rm "$f"
            fi
          done

      - name: Create Release PR or Publish
        if: steps.check.outputs.run_action == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bun run ci:release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
